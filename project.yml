name: MediaGate

options:
  bundleIdPrefix: com.kemalsanli
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  transitivelyLinkDependencies: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  SwiftFFmpeg:
    url: https://github.com/kemalsanli/SwiftFFmpeg.git
    branch: master

targets:
  MediaGateApp:
    type: application
    platform: iOS
    sources:
      - path: MediaGateApp
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: MediaGateKit
        embed: true
      - target: MediaGateExtension
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: plugins
      - package: SwiftFFmpeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemalsanli.mediagate
        INFOPLIST_FILE: MediaGateApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MediaGateApp/MediaGateApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
        PRODUCT_NAME: MediaGate

  MediaGateExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MediaGateExtension
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: MediaGateKit
        embed: false
      - package: SwiftFFmpeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemalsanli.mediagate.share-extension
        INFOPLIST_FILE: MediaGateExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MediaGateExtension/MediaGateExtension.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        APPLICATION_EXTENSION_API_ONLY: true
        PRODUCT_NAME: MediaGateExtension
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  MediaGateKit:
    type: framework
    platform: iOS
    sources:
      - path: MediaGateKit/Sources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemalsanli.mediagate.kit
        INFOPLIST_FILE: MediaGateKit/Sources/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: MediaGateKit

schemes:
  MediaGate:
    build:
      targets:
        MediaGateApp: all
        MediaGateExtension: all
        MediaGateKit: all
    run:
      config: Debug
    archive:
      config: Release
