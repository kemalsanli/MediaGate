name: MediaGate

options:
  bundleIdPrefix: com.kemalsanli
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  transitivelyLinkDependencies: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  SwiftFFmpeg:
    url: https://github.com/kemalsanli/SwiftFFmpeg.git
    branch: master

targets:
  MediaGateApp:
    type: application
    platform: iOS
    sources:
      - path: MediaGateApp
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: MediaGateKit
        embed: true
      - target: MediaGateExtension
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: plugins
      - target: MediaGateAction
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: plugins
      - package: SwiftFFmpeg
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemalsanli.mediagate
        INFOPLIST_FILE: MediaGateApp/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: MediaGateApp/MediaGateApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 2
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
        PRODUCT_NAME: MediaGate

  MediaGateExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MediaGateExtension
        excludes:
          - "**/.DS_Store"
      - path: MediaGateApp/Resources/Localizable.xcstrings
        buildPhase: resources
    dependencies:
      - target: MediaGateKit
        embed: false
      - package: SwiftFFmpeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemalsanli.mediagate.share-extension
        INFOPLIST_FILE: MediaGateExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MediaGateExtension/MediaGateExtension.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 2
        GENERATE_INFOPLIST_FILE: false
        APPLICATION_EXTENSION_API_ONLY: true
        PRODUCT_NAME: MediaGateExtension
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  MediaGateAction:
    type: app-extension
    platform: iOS
    sources:
      - path: MediaGateAction
        excludes:
          - "**/.DS_Store"
      - path: MediaGateApp/Resources/Localizable.xcstrings
        buildPhase: resources
    dependencies:
      - target: MediaGateKit
        embed: false
      - package: SwiftFFmpeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemalsanli.mediagate.action-extension
        INFOPLIST_FILE: MediaGateAction/Info.plist
        CODE_SIGN_ENTITLEMENTS: MediaGateAction/MediaGateAction.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 2
        GENERATE_INFOPLIST_FILE: false
        APPLICATION_EXTENSION_API_ONLY: true
        PRODUCT_NAME: MediaGateAction
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  MediaGateKit:
    type: framework
    platform: iOS
    sources:
      - path: MediaGateKit/Sources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemalsanli.mediagate.kit
        INFOPLIST_FILE: MediaGateKit/Sources/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 2
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: MediaGateKit

  MediaGateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MediaGateKit/Tests
        excludes:
          - "**/.DS_Store"
          - "TestResources/**"
      - path: MediaGateKit/Tests/TestResources
        buildPhase: resources
    dependencies:
      - target: MediaGateApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemalsanli.mediagate.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MediaGate.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MediaGate"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  MediaGate:
    build:
      targets:
        MediaGateApp: all
        MediaGateExtension: all
        MediaGateAction: all
        MediaGateKit: all
        MediaGateTests: [test]
    run:
      config: Debug
      storeKitConfiguration: MediaGateApp/Resources/TipProducts.storekit
    test:
      config: Debug
      targets:
        - MediaGateTests
    archive:
      config: Release
